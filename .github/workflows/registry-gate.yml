# ============================================================================
# DRAFT — needs maintainer review before enabling.
# ============================================================================
# Decides whether a PR is eligible for the lighter-touch (auto-merge) tier. It does NOT
# replace CODEOWNERS or branch protection — it only *enables* auto-merge when ALL hold:
#   1. PR author is in .github/contributors.allow with a matching scope, AND
#   2. the PR is small and touches no sensitive path, AND
#   3. it is `agent-ready` and NOT `agent-blocked`, AND
#   4. all required checks pass.
# Crypto / proto / policy / CI / governance changes are NEVER auto-merged here.
#
# SECURITY (mandatory, do not relax):
#   - Trigger is `pull_request` (NEVER `pull_request_target`) so untrusted PR code cannot
#     run with write tokens / repo secrets.
#   - Top-level permissions are minimal (contents: read).
#   - Every action is pinned to a full commit SHA.
#   - The allowlist is read from the BASE checkout; untrusted PR data (filenames, author)
#     is passed to github-script via env + JSON, NEVER interpolated into the script source.
#
# TODO(maintainer): review tier logic + path rules, then (a) remove the `&& false` guard,
# (b) enable "Allow auto-merge", (c) require the relevant checks in branch protection.
# ============================================================================
name: registry-gate (DRAFT)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: registry-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    name: evaluate eligibility (advisory)
    runs-on: ubuntu-latest
    # DRAFT GUARD: remove `&& false` only after maintainer review.
    if: ${{ github.event.pull_request.draft == false && false }}
    permissions:
      contents: read
      pull-requests: write # to label / comment eligibility
    steps:
      - name: Checkout base (trusted) ref
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Check out the BASE repo (not the PR head) so the allowlist + scripts are trusted.
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Compute changed files (read-only, JSON-encoded)
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Head content is untrusted DATA, only diffed by name — never executed.
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          # Emit a JSON array so filenames are safe to pass through an env var (no shell/JS injection).
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | jq -R -s 'split("\n") | map(select(length > 0))' -c > changed.json
          echo "json=$(cat changed.json)" >> "$GITHUB_OUTPUT"

      - name: Decide eligibility
        # actions/github-script v7.0.1
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          # Untrusted PR-controlled data — passed as DATA, never interpolated into the script.
          CHANGED_FILES_JSON: ${{ steps.diff.outputs.json }}
        with:
          script: |
            const fs = require('fs');
            const author = (context.payload.pull_request.user.login || '').toLowerCase();
            const labels = (context.payload.pull_request.labels || []).map((l) => (l.name || '').toLowerCase());
            let changed = [];
            try {
              changed = JSON.parse(process.env.CHANGED_FILES_JSON || '[]');
            } catch {
              changed = [];
            }

            // Trusted allowlist from the base checkout.
            const allow = fs.readFileSync('.github/contributors.allow', 'utf8');
            const row = allow
              .split('\n')
              .map((l) => l.replace(/#.*$/, '').trim())
              .filter(Boolean)
              .map((l) => l.split(/\s+/))
              .find((cols) => (cols[0] || '').toLowerCase() === author);
            const scopes = row ? (row[1] || '').split(',').map((s) => s.trim()) : [];

            // Sensitive paths that can NEVER auto-merge (mirror CODEOWNERS).
            const SENSITIVE = [
              /^proto\//,
              /(^|\/)parent-kmp\/proto\//,
              /\/crypto\//,
              /BundleVerifier\.kt$/,
              /PolicyEnforcer\.kt$/,
              /PolicyService\.kt$/,
              /(^|\/)provision/i,
              /^\.github\//,
              /^\.claude\//,
              /^\.mcp\.json$/,
              /^CODEOWNERS$/,
              /^AGENTS\.md$/,
              /^CLAUDE\.md$/,
              /^SECURITY\.md$/,
              /^GOVERNANCE\.md$/,
            ];
            const touchesSensitive = changed.some((f) => SENSITIVE.some((re) => re.test(f)));
            const kbOnly = changed.length > 0 && changed.every((f) => f.startsWith('kb/'));

            const MAX_FILES = 25;
            const sizeOk = changed.length > 0 && changed.length <= MAX_FILES;
            const agentBlocked = labels.includes('agent-blocked');
            const agentReady = labels.includes('agent-ready');

            const eligible =
              scopes.length > 0 &&
              !touchesSensitive &&
              !agentBlocked &&
              sizeOk &&
              (kbOnly ? scopes.includes('kb') : agentReady && scopes.includes('code'));

            core.notice(
              `author=${author} scopes=[${scopes}] files=${changed.length} kbOnly=${kbOnly} ` +
                `agentReady=${agentReady} agentBlocked=${agentBlocked} sensitive=${touchesSensitive} eligible=${eligible}`
            );
            // DRAFT: annotate only. TODO(maintainer): on eligible && required checks green, enable auto-merge.
