openapi: 3.0.3
info:
  title: OpenWarden Child API
  version: 1.0.0
  description: |
    HTTP API exposed by the child DPC on the LAN (port 7180).

    Auth is APP-LAYER, not a transport HMAC (ADR-030): every state-changing request carries a
    parent-signed wire object verified against the parent Ed25519 key pinned at pairing (ADR-025)
    — /policy a SignedBundle, /heartbeat a SignedHeartbeat, /lock & /unlock a SignedCommand. The
    read endpoints (/state, /usage) expose metadata only and stay open on the LAN in v1 (ADR-030 D6).
    (The earlier HMAC-SHA256 + 60s-timestamp scheme described here was never built; superseded by ADR-030.)

servers:
  - url: http://{child_tailscale_ip}:{port}
    variables:
      child_tailscale_ip: {default: "100.64.0.0"}
      port: {default: "7180"}

paths:
  /state:
    get:
      summary: Current child state (open metadata read, ADR-030 D6)
      description: |
        Reconciled to the implemented StateResponse (ADR-042 D5/D5a, #114). The prior schema
        (ISO policy_expires_at + battery_pct/charging/current_app) was never built and is removed.
        is_locked and paired are fail-closed (an unreadable store/key reports the safe default).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [version, policy_version, policy_not_after, is_locked, paired, reported_at]
                properties:
                  version: {type: string}
                  # "none" when no policy yet, else issued_at as integer-ms rendered to a string (§2).
                  policy_version: {type: string}
                  # "n/a" when no policy yet, else not_after as integer-ms rendered to a string (§2).
                  policy_not_after: {type: string}
                  # Durable lock state set by signed /lock|/unlock (ADR-030 D5). Fail-closed: assume locked.
                  is_locked: {type: boolean}
                  # True iff a parent Ed25519 key is pinned (ADR-025/ADR-042 D5). Fail-closed: false on read error.
                  paired: {type: boolean}
                  # Child wall-clock at response time, epoch ms (ADR-042 D5a). LIVENESS ONLY — not a trust
                  # boundary, distinct from the ADR-041 monotonic policy-freshness clock; parent treats it
                  # as untrusted and fails closed both sides of its freshness window.
                  reported_at: {type: integer, format: int64}

  /policy:
    post:
      summary: Apply new signed policy bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyBundle'
      responses:
        '200':
          description: Applied
        '400':
          description: Signature invalid or bundle expired
        '401':
          description: HMAC failed

  /heartbeat:
    post:
      summary: Authenticated parent keep-alive (ADR-024)
      description: |
        A minimal signed parent liveness ping that resets the child's no-contact ratchet
        (ADR-024) WITHOUT re-issuing a policy bundle. The child verifies the Ed25519 signature
        against the pinned parent key, audience-binds child_device_id, and enforces a monotonic
        issued_at replay floor before resetting the ratchet timer. issued_at is the replay floor
        only — silence is measured by the child's own monotonic clock, not the parent's time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Heartbeat'
      responses:
        '200':
          description: Verified — ratchet reset
        '400':
          description: Signature invalid, wrong audience, or replayed (issued_at <= floor)
        '401':
          description: HMAC failed

  /usage:
    get:
      summary: Per-app foreground usage, metadata only (open read, ADR-030 D6)
      description: |
        Reconciled to the implemented UsageResponse (ADR-042, #74/#114). METADATA ONLY — package +
        label + floored foreground minutes over the last 24h (queryUsageStats aggregate, never
        queryEvents). `source` reports the data provenance; no-grant fails closed to honest-empty on
        release (`unavailable`) and a clearly-labelled demo list on debug builds (`demo-fallback`);
        an unexpected error returns 500 with `source: error` and an empty per_app (never fabricated).
        The prior schema (range_start/range_end + pkg/ms/launches + `since` param) was never built.
      responses:
        '200':
          description: OK (source = on-device | demo-fallback | unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'
        '500':
          description: Unexpected error — source = error, per_app empty (fail-closed, never fabricated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'

  /location:
    get:
      summary: One-shot fused location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lat: {type: number}
                  lon: {type: number}
                  accuracy_m: {type: number}
                  at: {type: string, format: date-time}

  /lock:
    post:
      summary: Lock device now
      responses: {'200': {description: Locked}}

  /unlock-request:
    post:
      summary: Child-initiated 'ask dad' request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: {type: string}
                pkg: {type: string, nullable: true}
                duration_min: {type: integer, nullable: true}
      responses: {'200': {description: Queued}}

  /events:
    get:
      summary: Event log (last 30d)
      responses:
        '200':
          description: OK

components:
  schemas:
    PolicyBundle:
      type: object
      required: [v, issued_at, expires_at, nonce, policy, sig]
      properties:
        v: {type: integer, enum: [1]}
        issued_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        nonce: {type: string}
        policy:
          type: object
          properties:
            allowlist:
              type: array
              items: {type: string}
            windows:
              type: array
              items:
                type: object
                properties:
                  pkg: {type: string}
                  allow_cron: {type: string}
            restrictions:
              type: array
              items: {type: string}
            private_dns:
              type: string
              nullable: true
            frp_account:
              type: string
              nullable: true
        sig:
          type: string
          description: Ed25519 signature (hex) over RFC 8785 JCS of all fields except 'sig'
      # NOTE: this PolicyBundle block is drifted vs the implemented PROTOCOL.md §2 / child
      # SignedBundle schema (which uses integer-ms issued_at/not_before/not_after, child_device_id,
      # policy_seq, and allow/days/tz windows). Reconciling it is tracked separately; the Heartbeat
      # below matches the implemented child schema exactly.

    AppUsageEntry:
      type: object
      required: [packageName, foregroundMinutes]
      description: Metadata-only per-app entry (ADR-042 D1) — no in-app content ever.
      properties:
        packageName: {type: string}
        # OS-provided app display name; OMITTED from the wire when unresolved (server explicitNulls=false).
        label: {type: string, nullable: true}
        foregroundMinutes: {type: integer, format: int64}

    UsageResponse:
      type: object
      required: [source, window_hours, per_app]
      properties:
        source:
          type: string
          enum: [on-device, demo-fallback, unavailable, error]
        window_hours: {type: integer}
        per_app:
          type: array
          items: {$ref: '#/components/schemas/AppUsageEntry'}
        # Present only for source=demo-fallback / unavailable / error respectively (omitted otherwise).
        demo_notice: {type: string, nullable: true}
        notice: {type: string, nullable: true}
        error: {type: string, nullable: true}

    Heartbeat:
      type: object
      required: [v, child_device_id, issued_at, sig]
      description: ADR-024 authenticated parent keep-alive. Resets the child no-contact ratchet.
      properties:
        v: {type: integer, enum: [1]}
        child_device_id:
          type: string
          description: Audience — the addressed child's pinned id. The child rejects a heartbeat for any other id.
        issued_at:
          type: integer
          format: int64
          description: Parent send time, ms (u53-bounded 0..2^53-1). Used ONLY as the monotonic replay floor.
        sig:
          type: string
          description: Ed25519 signature (hex) over RFC 8785 JCS of all fields except 'sig'
