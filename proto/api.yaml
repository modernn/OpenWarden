openapi: 3.0.3
info:
  title: OpenWarden Child API
  version: 1.0.0
  description: |
    HTTP API exposed by the child DPC. Bound to the Tailscale interface only.
    Every request requires HMAC-SHA256 auth (Authorization: OpenWarden <hex>) over the
    canonicalized body + Unix timestamp. Timestamps within 60s window only.

servers:
  - url: http://{child_tailscale_ip}:{port}
    variables:
      child_tailscale_ip: {default: "100.64.0.0"}
      port: {default: "7180"}

paths:
  /state:
    get:
      summary: Current child state
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: {type: string}
                  policy_version: {type: string}
                  policy_expires_at: {type: string, format: date-time}
                  battery_pct: {type: integer}
                  charging: {type: boolean}
                  current_app: {type: string, nullable: true}
                  is_locked: {type: boolean}

  /policy:
    post:
      summary: Apply new signed policy bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyBundle'
      responses:
        '200':
          description: Applied
        '400':
          description: Signature invalid or bundle expired
        '401':
          description: HMAC failed

  /heartbeat:
    post:
      summary: Authenticated parent keep-alive (ADR-024)
      description: |
        A minimal signed parent liveness ping that resets the child's no-contact ratchet
        (ADR-024) WITHOUT re-issuing a policy bundle. The child verifies the Ed25519 signature
        against the pinned parent key, audience-binds child_device_id, and enforces a monotonic
        issued_at replay floor before resetting the ratchet timer. issued_at is the replay floor
        only — silence is measured by the child's own monotonic clock, not the parent's time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Heartbeat'
      responses:
        '200':
          description: Verified — ratchet reset
        '400':
          description: Signature invalid, wrong audience, or replayed (issued_at <= floor)
        '401':
          description: HMAC failed

  /usage:
    get:
      summary: App usage stats
      parameters:
        - in: query
          name: since
          schema: {type: string, format: date-time}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  range_start: {type: string, format: date-time}
                  range_end: {type: string, format: date-time}
                  per_app:
                    type: array
                    items:
                      type: object
                      properties:
                        pkg: {type: string}
                        ms: {type: integer}
                        launches: {type: integer}

  /location:
    get:
      summary: One-shot fused location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lat: {type: number}
                  lon: {type: number}
                  accuracy_m: {type: number}
                  at: {type: string, format: date-time}

  /lock:
    post:
      summary: Lock device now
      responses: {'200': {description: Locked}}

  /unlock-request:
    post:
      summary: Child-initiated 'ask dad' request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: {type: string}
                pkg: {type: string, nullable: true}
                duration_min: {type: integer, nullable: true}
      responses: {'200': {description: Queued}}

  /events:
    get:
      summary: Event log (last 30d)
      responses:
        '200':
          description: OK

components:
  schemas:
    PolicyBundle:
      type: object
      required: [v, issued_at, expires_at, nonce, policy, sig]
      properties:
        v: {type: integer, enum: [1]}
        issued_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        nonce: {type: string}
        policy:
          type: object
          properties:
            allowlist:
              type: array
              items: {type: string}
            windows:
              type: array
              items:
                type: object
                properties:
                  pkg: {type: string}
                  allow_cron: {type: string}
            restrictions:
              type: array
              items: {type: string}
            private_dns:
              type: string
              nullable: true
            frp_account:
              type: string
              nullable: true
        sig:
          type: string
          description: Ed25519 signature (hex) over RFC 8785 JCS of all fields except 'sig'
      # NOTE: this PolicyBundle block is drifted vs the implemented PROTOCOL.md §2 / child
      # SignedBundle schema (which uses integer-ms issued_at/not_before/not_after, child_device_id,
      # policy_seq, and allow/days/tz windows). Reconciling it is tracked separately; the Heartbeat
      # below matches the implemented child schema exactly.

    Heartbeat:
      type: object
      required: [v, child_device_id, issued_at, sig]
      description: ADR-024 authenticated parent keep-alive. Resets the child no-contact ratchet.
      properties:
        v: {type: integer, enum: [1]}
        child_device_id:
          type: string
          description: Audience — the addressed child's pinned id. The child rejects a heartbeat for any other id.
        issued_at:
          type: integer
          format: int64
          description: Parent send time, ms (u53-bounded 0..2^53-1). Used ONLY as the monotonic replay floor.
        sig:
          type: string
          description: Ed25519 signature (hex) over RFC 8785 JCS of all fields except 'sig'
